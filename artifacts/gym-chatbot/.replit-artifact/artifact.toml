kind = "web"
previewPath = "/"
title = "Gym Management Chatbot"
version = "1.0.0"
id = "artifacts/gym-chatbot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19016

[services.development]
run = "pnpm --filter @workspace/gym-chatbot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gym-chatbot", "run", "build" ]
publicDir = "artifacts/gym-chatbot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19016"
BASE_PATH = "/"
